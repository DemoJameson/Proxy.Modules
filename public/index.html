<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Proxy.Modules</title>
        <meta name="description" content="DemoJameson 的代理工具模块仓库，支持 Egern、Loon、Surge、Quantumult X 安装" />
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;600;700&display=swap");

            :root {
                --bg: #f3ecdf;
                --paper: rgba(255, 251, 245, 0.82);
                --paper-strong: #fffaf2;
                --ink: #191613;
                --muted: #6d6358;
                --line: rgba(25, 22, 19, 0.12);
                --line-strong: rgba(25, 22, 19, 0.28);
                --copper: #b65a36;
                --copper-deep: #8b3a20;
                --forest: #27453c;
                --gold: #d6b36a;
                --shadow: 0 24px 80px rgba(64, 36, 18, 0.12);
                --radius-xl: 30px;
                --radius-lg: 24px;
                --radius-md: 18px;
                --font-body: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
                --font-display: "Noto Serif SC", "Songti SC", serif;
            }

            * {
                box-sizing: border-box;
            }

            html {
                scroll-behavior: smooth;
            }

            body {
                margin: 0;
                min-height: 100vh;
                color: var(--ink);
                font-family: var(--font-body);
                letter-spacing: 0.01em;
                background:
                    radial-gradient(circle at 15% 18%, rgba(182, 90, 54, 0.22), transparent 22%), radial-gradient(circle at 82% 12%, rgba(39, 69, 60, 0.18), transparent 18%),
                    radial-gradient(circle at 50% 100%, rgba(214, 179, 106, 0.18), transparent 26%), linear-gradient(180deg, #f8f1e4 0%, #f1eadc 42%, #ece4d8 100%);
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                pointer-events: none;
                opacity: 0.26;
                background-image: linear-gradient(rgba(25, 22, 19, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(25, 22, 19, 0.03) 1px, transparent 1px);
                background-size: 24px 24px;
                mask-image: radial-gradient(circle at center, black 48%, transparent 92%);
            }

            a {
                color: inherit;
                text-decoration: none;
            }

            .page {
                width: min(1180px, calc(100% - 28px));
                margin: 0 auto;
                padding: 28px 0 72px;
            }

            .panel {
                position: relative;
                background: var(--paper);
                border: 1px solid var(--line);
                border-radius: var(--radius-xl);
                box-shadow: var(--shadow);
                backdrop-filter: blur(22px);
                overflow: hidden;
            }

            .panel::after {
                content: "";
                position: absolute;
                inset: 0;
                pointer-events: none;
                background: linear-gradient(130deg, rgba(255, 255, 255, 0.28), transparent 26%), linear-gradient(320deg, rgba(182, 90, 54, 0.08), transparent 34%);
            }

            .hero {
                padding: 34px;
            }

            .hero-corner-link {
                position: absolute;
                top: 24px;
                right: 24px;
                z-index: 2;
                width: 56px;
                height: 56px;
                min-height: 56px;
                padding: 0;
                border: none;
                border-radius: 50%;
                background: transparent;
                color: var(--ink);
                box-shadow: none;
                backdrop-filter: none;
                transition:
                    transform 0.2s ease,
                    color 0.2s ease;
            }

            .hero-corner-link:hover {
                transform: translateY(-2px);
                color: var(--copper-deep);
            }

            .hero-corner-link svg {
                width: 40px;
                height: 40px;
                fill: currentColor;
                overflow: visible;
                transform: scale(1.14);
                transform-origin: center;
            }

            h1,
            h2,
            h3 {
                margin: 0;
                font-family: var(--font-display);
                font-weight: 600;
                letter-spacing: -0.02em;
            }

            h1 {
                margin-top: 18px;
                font-size: clamp(52px, 8vw, 92px);
                line-height: 0.92;
                font-weight: 700;
            }

            .lead {
                max-width: 760px;
                margin: 18px 0 0;
                color: var(--muted);
                font-size: 17px;
                line-height: 1.85;
                letter-spacing: 0.015em;
            }

            .module-card {
                position: relative;
                z-index: 1;
            }

            .hero-actions {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                margin-top: 26px;
            }

            .button {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 50px;
                padding: 0 18px;
                border-radius: 999px;
                border: 1px solid transparent;
                font-family: var(--font-body);
                font-weight: 700;
                letter-spacing: 0.02em;
                transition:
                    transform 0.2s ease,
                    border-color 0.2s ease,
                    background-color 0.2s ease,
                    color 0.2s ease;
            }

            .button:hover {
                transform: translateY(-2px);
            }

            .button.primary {
                background: var(--copper);
                color: #fff8f2;
            }

            .button.primary:hover {
                background: var(--copper-deep);
            }

            .button.primary.import-toggle,
            .button.primary.import-toggle:hover,
            .button.primary.import-toggle:active,
            .button.primary.import-toggle:focus,
            .button.primary.import-toggle:focus-visible,
            .import-panel[open] .button.primary.import-toggle {
                background: var(--copper);
                color: #fff8f2;
                border-color: transparent;
                outline: none;
                transform: none;
            }

            .button.secondary {
                border-color: var(--line);
                background: rgba(255, 255, 255, 0.58);
            }

            .button.secondary:hover {
                border-color: var(--line-strong);
                background: #fffefb;
            }

            .section-head {
                display: flex;
                justify-content: space-between;
                align-items: end;
                gap: 16px;
                margin: 38px 0 18px;
            }

            .section-head h2 {
                font-size: clamp(34px, 5vw, 50px);
                line-height: 0.95;
            }

            .section-head p {
                margin: 0;
                max-width: 580px;
                color: var(--muted);
                line-height: 1.8;
                text-align: right;
            }

            .catalog {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
                gap: 22px;
            }

            .module-card {
                padding: 24px;
                border: 1px solid var(--line);
                border-radius: var(--radius-lg);
                background: linear-gradient(180deg, rgba(255, 255, 255, 0.74), rgba(249, 242, 232, 0.92)), linear-gradient(135deg, rgba(214, 179, 106, 0.12), transparent 42%);
                transition:
                    transform 0.22s ease,
                    border-color 0.22s ease,
                    box-shadow 0.22s ease;
                animation: rise 0.6s ease both;
            }

            .module-card:hover {
                transform: translateY(-4px);
                border-color: rgba(182, 90, 54, 0.24);
                box-shadow: 0 22px 56px rgba(70, 40, 22, 0.12);
            }

            .module-card:nth-child(2) {
                animation-delay: 0.08s;
            }

            .module-head {
                display: flex;
                align-items: center;
                gap: 16px;
            }

            .module-icon {
                width: 58px;
                height: 58px;
                flex: 0 0 58px;
                border-radius: 16px;
                border: 1px solid rgba(25, 22, 19, 0.08);
                background: rgba(255, 255, 255, 0.82);
                box-shadow: 0 10px 24px rgba(64, 36, 18, 0.08);
                object-fit: cover;
            }

            .module-card h3 {
                font-size: clamp(24px, 2.6vw, 28px);
                line-height: 1.05;
            }

            .module-card p {
                margin: 14px 0 0;
                color: var(--muted);
                line-height: 1.8;
                letter-spacing: 0.015em;
                min-height: 86px;
            }

            .import-group {
                margin-top: 22px;
                padding-top: 18px;
                border-top: 1px solid var(--line);
            }

            .tool-grid {
                display: grid;
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 10px;
                margin-top: 14px;
            }

            .tool-link {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 104px;
                padding: 16px;
                border: 1px solid var(--line);
                border-radius: var(--radius-md);
                background: rgba(255, 255, 255, 0.7);
                transition:
                    transform 0.2s ease,
                    border-color 0.2s ease,
                    background-color 0.2s ease;
            }

            .tool-link:hover {
                transform: translateY(-2px);
                border-color: rgba(39, 69, 60, 0.24);
                background: #fffefb;
            }

            .tool-link .label {
                font-size: 16px;
                font-weight: 700;
                text-align: center;
                letter-spacing: 0.02em;
            }

            .import-toggle {
                width: 100%;
                justify-content: space-between;
                padding: 0 20px;
                cursor: pointer;
            }

            .import-toggle::after {
                content: "+";
                font-size: 22px;
                line-height: 1;
                transition: transform 0.2s ease;
            }

            .import-panel[open] .import-toggle::after {
                transform: rotate(45deg);
            }

            .import-panel summary {
                list-style: none;
            }

            .import-panel summary::-webkit-details-marker {
                display: none;
            }

            .folder-link {
                margin-top: 16px;
                justify-content: space-between;
                width: 100%;
                padding: 0 18px;
            }

            .link-row {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-top: 16px;
            }

            @keyframes rise {
                from {
                    opacity: 0;
                    transform: translateY(16px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @media (max-width: 920px) {
                .section-head {
                    flex-direction: column;
                    align-items: flex-start;
                }

                .section-head p {
                    text-align: left;
                }
            }

            @media (max-width: 720px) {
                .page {
                    width: min(100% - 18px, 1180px);
                    padding: 14px 0 44px;
                }

                .hero {
                    padding: 22px;
                }

                .hero-corner-link {
                    top: 14px;
                    right: 14px;
                    width: 38px;
                    height: 38px;
                    min-height: 38px;
                }

                .hero-corner-link svg {
                    width: 24px;
                    height: 24px;
                }

                h1 {
                    font-size: clamp(32px, 11vw, 48px);
                }

                .module-card {
                    padding: 20px;
                }

                .module-card h3 {
                    font-size: 24px;
                }

                .tool-grid {
                    grid-template-columns: repeat(4, minmax(0, 1fr));
                    gap: 8px;
                }

                .tool-link {
                    min-height: 72px;
                    padding: 12px 8px;
                }

                .tool-link .label {
                    font-size: 13px;
                }

                .module-card p {
                    min-height: 0;
                }
            }
        </style>
    </head>
    <body>
        <main class="page">
            <section class="panel hero">
                <a class="button hero-corner-link" href="https://github.com/DemoJameson/Proxy.Modules" target="_blank" rel="noreferrer" aria-label="GitHub 仓库">
                    <svg viewBox="0 0 16 16" aria-hidden="true">
                        <path
                            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.47 7.47 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"
                        ></path>
                    </svg>
                </a>
                <div>
                    <h1>Proxy.Modules</h1>
                    <p class="lead">个人使用的代理工具脚本仓库</p>
                    <div class="hero-actions">
                        <a
                            class="button secondary"
                            href="http://boxjs.com/#/sub/add/https%3A%2F%2Fraw.githubusercontent.com%2FDemoJameson%2FProxy.Modules%2Fmain%2Fboxjs.json"
                            target="_blank"
                            rel="noreferrer"
                            >BoxJs 订阅</a
                        >
                    </div>
                </div>
            </section>

            <section class="section-head" id="catalog">
                <h2>脚本列表</h2>
            </section>

            <section class="catalog" id="module-list"></section>
        </main>

        <script>
            const tools = {
                loon: {
                    id: "loon",
                    name: "Loon",
                    buildImportUrl(resourceUrl) {
                        return `https://www.nsloon.com/openloon/import?plugin=${encodeURIComponent(resourceUrl)}`;
                    },
                },
                surge: {
                    id: "surge",
                    name: "Surge",
                    buildImportUrl(resourceUrl) {
                        return `surge:///install-module?url=${encodeURIComponent(resourceUrl)}`;
                    },
                },
                egern: {
                    id: "egern",
                    name: "Egern",
                    buildImportUrl(resourceUrl, moduleItem) {
                        return `egern:/modules/new?name=${encodeURIComponent(moduleItem.name)}&url=${encodeURIComponent(resourceUrl)}`;
                    },
                },
                qx: {
                    id: "qx",
                    name: "QX",
                    buildImportUrl(resourceUrl, moduleItem) {
                        const payload = {
                            rewrite_remote: [`${resourceUrl}, tag=${moduleItem.qxTag}, enabled=true`],
                        };
                        return `https://quantumult.app/x/open-app/add-resource?remote-resource=${encodeURIComponent(JSON.stringify(payload))}`;
                    },
                },
            };

            const modules = [
                {
                    id: "trakt_simplified_chinese",
                    name: "Trakt 增强",
                    description:
                        "Trakt App 各页面从英文改为简体中文；历史页面剧集类别的已观看记录按电视剧合并，方便以电视剧为单位查看；Trakt 和 SofaTime 的影片详情页添加 EplayerX、Forward、Infuse 跳转按钮；部分兼容其它使用了 Trakt API 的应用。",
                    qxTag: "Trakt Simplified Chinese",
                    icon: "https://raw.githubusercontent.com/DemoJameson/Proxy.Modules/main/trakt_simplified_chinese/images/trakt.webp",
                    githubFolder: "https://github.com/DemoJameson/Proxy.Modules/tree/main/trakt_simplified_chinese",
                    resources: {
                        loon: "https://raw.githubusercontent.com/DemoJameson/Proxy.Modules/main/trakt_simplified_chinese/trakt_simplified_chinese.plugin",
                        surge: "https://raw.githubusercontent.com/DemoJameson/Proxy.Modules/main/trakt_simplified_chinese/trakt_simplified_chinese.sgmodule",
                        egern: "https://raw.githubusercontent.com/DemoJameson/Proxy.Modules/main/trakt_simplified_chinese/trakt_simplified_chinese.plugin",
                        qx: "https://raw.githubusercontent.com/DemoJameson/Proxy.Modules/main/trakt_simplified_chinese/trakt_simplified_chinese.snippet",
                    },
                },
                {
                    id: "fix_infuse_image_language",
                    name: "修复 Infuse 图片语言",
                    description: "调整 TMDB 图片语言排序，改善 Infuse 对图片语言和地区的匹配结果",
                    qxTag: "Fix Infuse Image Language",
                    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Infuse.png",
                    githubFolder: "https://github.com/DemoJameson/Proxy.Modules/tree/main/fix_infuse_image_language",
                    resources: {
                        loon: "https://raw.githubusercontent.com/DemoJameson/Proxy.Modules/main/fix_infuse_image_language/fix_infuse_image_language.plugin",
                        surge: "https://raw.githubusercontent.com/DemoJameson/Proxy.Modules/main/fix_infuse_image_language/fix_infuse_image_language.sgmodule",
                        egern: "https://raw.githubusercontent.com/DemoJameson/Proxy.Modules/main/fix_infuse_image_language/fix_infuse_image_language.plugin",
                        qx: "https://raw.githubusercontent.com/DemoJameson/Proxy.Modules/main/fix_infuse_image_language/fix_infuse_image_language.snippet",
                    },
                },
            ];

            function _findModule(moduleId) {
                return modules.find((moduleItem) => moduleItem.id === moduleId) || null;
            }

            function findResource(moduleItem, toolId) {
                return moduleItem?.resources ? moduleItem.resources[toolId] : "";
            }

            function buildImportUrl(moduleItem, toolId) {
                const tool = tools[toolId];
                const resourceUrl = findResource(moduleItem, toolId);
                if (!tool || !resourceUrl) {
                    return "#";
                }
                return tool.buildImportUrl(resourceUrl, moduleItem);
            }

            function escapeHtml(value) {
                return String(value).replace(/[&<>"']/g, (char) => {
                    const map = {
                        "&": "&amp;",
                        "<": "&lt;",
                        ">": "&gt;",
                        '"': "&quot;",
                        "'": "&#39;",
                    };
                    return map[char] || char;
                });
            }

            function renderModuleCard(moduleItem) {
                const toolCards = ["egern", "loon", "surge", "qx"]
                    .map((toolId) => {
                        const tool = tools[toolId];
                        const importUrl = buildImportUrl(moduleItem, toolId);
                        return `
          <a class="tool-link" href="${importUrl}">
            <span class="label">${tool.name}</span>
          </a>
        `;
                    })
                    .join("");

                return `
        <article class="module-card">
          <div class="module-head">
            <img class="module-icon" src="${escapeHtml(moduleItem.icon)}" alt="">
            <h3>${escapeHtml(moduleItem.name)}</h3>
          </div>
          <p>${escapeHtml(moduleItem.description || "")}</p>
          <details class="import-group import-panel">
            <summary class="button primary import-toggle">安装</summary>
            <div class="tool-grid">${toolCards}</div>
          </details>
          <div class="link-row">
            <a class="button secondary folder-link" href="${moduleItem.githubFolder}" target="_blank" rel="noreferrer">查看代码</a>
          </div>
        </article>
      `;
            }

            function renderModules() {
                const list = document.getElementById("module-list");
                list.innerHTML = modules.map(renderModuleCard).join("");
            }
            renderModules();
        </script>
    </body>
</html>
