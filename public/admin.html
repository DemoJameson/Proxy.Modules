<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Trakt 翻译管理后台</title>
        <link rel="icon" type="image/webp" href="/trakt.webp" />
        <style>
            :root {
                color-scheme: light;
                --bg: #eef0e8;
                --panel: #fbfaf4;
                --panel-2: #f4f2ea;
                --ink: #1c2422;
                --muted: #66706b;
                --line: #d8d8cd;
                --line-strong: #b9bcaf;
                --accent: #176b5d;
                --accent-2: #c8583d;
                --warning: #9a6a12;
                --ok: #1f7a4d;
                --shadow: 0 18px 48px rgba(33, 43, 38, 0.12);
                --font: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", sans-serif;
                --admin-panel-min-height: 760px;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                background: linear-gradient(90deg, rgba(28, 36, 34, 0.04) 1px, transparent 1px), linear-gradient(rgba(28, 36, 34, 0.04) 1px, transparent 1px), var(--bg);
                background-size: 32px 32px;
                color: var(--ink);
                font-family: var(--font);
                letter-spacing: 0;
            }

            button,
            input,
            select,
            textarea {
                font: inherit;
            }

            button {
                border: 1px solid var(--line-strong);
                background: var(--panel);
                color: var(--ink);
                min-height: 38px;
                padding: 0 14px;
                border-radius: 6px;
                cursor: pointer;
                transition:
                    transform 0.16s ease,
                    border-color 0.16s ease,
                    background 0.16s ease;
            }

            button:hover {
                transform: translateY(-1px);
                border-color: var(--accent);
            }

            button:disabled {
                cursor: not-allowed;
                opacity: 0.52;
                transform: none;
            }

            input,
            select,
            textarea {
                width: 100%;
                border: 1px solid var(--line);
                border-radius: 6px;
                background: #fffef9;
                color: var(--ink);
                outline: none;
            }

            input,
            select {
                height: 38px;
                padding: 0 11px;
            }

            select {
                appearance: none;
                padding-right: 38px;
                background-image: linear-gradient(45deg, transparent 50%, var(--ink) 50%), linear-gradient(135deg, var(--ink) 50%, transparent 50%);
                background-position:
                    calc(100% - 19px) 16px,
                    calc(100% - 13px) 16px;
                background-repeat: no-repeat;
                background-size: 6px 6px;
            }

            textarea {
                min-height: 150px;
                resize: vertical;
                padding: 10px 11px;
                line-height: 1.55;
            }

            input:focus,
            select:focus,
            textarea:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(23, 107, 93, 0.14);
            }

            .shell {
                width: min(1440px, calc(100% - 32px));
                margin: 0 auto;
                padding: 24px 0 44px;
            }

            .shell[aria-busy="true"] {
                filter: blur(2px);
                pointer-events: none;
                user-select: none;
            }

            .token-dialog {
                width: min(420px, calc(100% - 32px));
                border: 1px solid var(--line-strong);
                border-radius: 8px;
                background: var(--panel);
                color: var(--ink);
                box-shadow: 0 28px 72px rgba(28, 36, 34, 0.28);
                padding: 0;
            }

            .token-dialog::backdrop {
                background: rgba(28, 36, 34, 0.48);
                backdrop-filter: blur(7px);
            }

            .token-dialog form {
                padding: 20px;
            }

            .token-dialog h2 {
                margin: 0 0 8px;
                font-size: 22px;
                line-height: 1.2;
            }

            .token-dialog p {
                margin: 0 0 18px;
                color: var(--muted);
                line-height: 1.55;
            }

            .token-dialog-actions {
                display: flex;
                justify-content: flex-end;
                gap: 8px;
                margin-top: 14px;
            }

            .dialog-error {
                min-height: 20px;
                margin-top: 8px;
                color: var(--accent-2);
                font-size: 13px;
            }

            .topbar {
                padding-bottom: 18px;
                border-bottom: 2px solid var(--ink);
            }

            h1 {
                margin: 0;
                font-size: 30px;
                line-height: 1.1;
                font-weight: 800;
            }

            .layout {
                display: grid;
                grid-template-columns: minmax(360px, 0.92fr) minmax(480px, 1.35fr);
                gap: 18px;
                margin-top: 18px;
                align-items: start;
            }

            .surface {
                display: flex;
                min-height: var(--admin-panel-min-height);
                max-height: calc(100vh - 116px);
                flex-direction: column;
                background: rgba(251, 250, 244, 0.9);
                border: 1px solid var(--line);
                box-shadow: var(--shadow);
            }

            .filters {
                padding: 14px;
            }

            .filter-grid {
                display: grid;
                grid-template-columns: 1fr 130px 120px;
                gap: 10px;
            }

            .filter-field {
                display: grid;
                gap: 6px;
            }

            .filter-label {
                color: var(--muted);
                font-size: 12px;
                font-weight: 800;
            }

            .list-head,
            .list-foot,
            .editor-head {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                padding: 12px 14px;
                border-top: 1px solid var(--line);
                border-bottom: 1px solid var(--line);
                background: var(--panel-2);
            }

            .list-foot {
                justify-content: center;
                border-top: 1px solid var(--line);
                border-bottom: 0;
            }

            .meta {
                color: var(--muted);
                font-size: 13px;
            }

            .editor-title-line {
                display: inline-flex;
                min-width: 0;
                align-items: center;
                gap: 10px;
                flex-wrap: wrap;
            }

            .list-head .meta {
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .list-foot button {
                flex-shrink: 0;
                width: 96px;
                padding: 0 12px;
                white-space: nowrap;
            }

            .rows {
                flex: 1;
                min-height: 0;
                overflow: auto;
            }

            .row-header {
                display: grid;
                grid-template-columns: minmax(90px, 1fr) minmax(140px, 1.6fr) 86px 92px;
                gap: 12px;
                align-items: center;
                padding: 9px 14px;
                border-bottom: 1px solid var(--line);
                background: rgba(251, 250, 244, 0.78);
                color: var(--muted);
                font-size: 12px;
                font-weight: 800;
            }

            .row {
                position: relative;
                width: 100%;
                display: grid;
                grid-template-columns: minmax(90px, 1fr) minmax(140px, 1.6fr) 86px 92px;
                gap: 12px;
                align-items: center;
                min-height: 58px;
                padding: 10px 14px;
                border: 0;
                border-bottom: 1px solid var(--line);
                border-radius: 0;
                background: transparent;
                text-align: left;
            }

            .row:hover {
                border-bottom-color: var(--line);
                background: #eaf3ef;
                transform: none;
            }

            .row.active {
                background: #d7ebe3;
                box-shadow: inset 4px 0 0 var(--accent);
                transform: none;
            }

            .id {
                color: var(--muted);
                font-variant-numeric: tabular-nums;
                overflow-wrap: anywhere;
            }

            .media-type {
                color: var(--ink);
                font-weight: 700;
                white-space: nowrap;
            }

            .title {
                font-weight: 720;
                overflow-wrap: anywhere;
            }

            .row.active .title,
            .row.active .media-type {
                color: var(--accent);
            }

            .badge {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 72px;
                min-height: 24px;
                padding: 0 8px;
                border-radius: 999px;
                background: #e5e3d8;
                color: var(--muted);
                font-size: 12px;
                white-space: nowrap;
            }

            .badge.overridden {
                background: #dcece6;
                color: var(--accent);
            }

            .badge.empty {
                background: #f3e3dd;
                color: var(--accent-2);
            }

            .editor {
                min-height: var(--admin-panel-min-height);
                max-height: calc(100vh - 116px);
            }

            .editor-body {
                flex: 1;
                min-height: 0;
                overflow: auto;
                padding: 14px;
            }

            .editor-meta {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                flex-wrap: wrap;
            }

            .editor-tools {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                flex-wrap: wrap;
                justify-content: flex-end;
            }

            .external-link {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 30px;
                padding: 0 10px;
                border: 1px solid var(--line-strong);
                border-radius: 6px;
                background: #fffef9;
                color: var(--accent);
                font-size: 13px;
                font-weight: 650;
            }

            .external-link.icon-only {
                width: 36px;
                padding: 0;
            }

            .trakt-icon {
                width: 18px;
                height: 18px;
                border-radius: 4px;
            }

            .external-link:hover {
                border-color: var(--accent);
                background: #eaf3ef;
            }

            .field-grid {
                display: grid;
                gap: 14px;
            }

            .field {
                display: grid;
                grid-template-columns: minmax(0, 1fr) 132px;
                gap: 10px;
                align-items: start;
                padding-bottom: 14px;
                border-bottom: 1px solid var(--line);
            }

            label {
                display: block;
                margin: 0 0 6px;
                color: var(--muted);
                font-size: 13px;
                font-weight: 650;
            }

            .lock {
                display: flex;
                align-items: center;
                gap: 8px;
                height: 38px;
                margin-top: 22px;
                color: var(--ink);
                font-size: 13px;
                font-weight: 650;
            }

            .lock input {
                width: 18px;
                height: 18px;
                accent-color: var(--accent);
            }

            .compare {
                display: grid;
                grid-template-columns: 1fr;
                gap: 10px;
                margin-top: 14px;
            }

            .compare pre {
                margin: 0;
                min-height: 150px;
                max-height: 280px;
                overflow: auto;
                padding: 12px;
                background: #262d2a;
                color: #f2f4ed;
                border-radius: 6px;
                font-size: 12px;
                line-height: 1.5;
                white-space: pre-wrap;
                overflow-wrap: anywhere;
            }

            .json-key {
                color: #8bd9ff;
            }

            .json-string {
                color: #b8e986;
            }

            .json-number {
                color: #ffcc7a;
            }

            .json-boolean {
                color: #d7b8ff;
            }

            .json-null {
                color: #ff9aa2;
            }

            .actions {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-top: 14px;
            }

            .primary {
                border-color: var(--accent);
                background: var(--accent);
                color: white;
            }

            .danger {
                border-color: #d7a697;
                color: var(--accent-2);
            }

            .status {
                display: inline-flex;
                align-items: center;
                gap: 7px;
                min-height: 30px;
                padding: 0 10px;
                border: 1px solid var(--line);
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.62);
                color: var(--muted);
                font-size: 12px;
                font-weight: 800;
                line-height: 1;
            }

            .list-head .status {
                max-width: 55%;
                flex-shrink: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .status.error {
                border-color: #e0b5aa;
                background: #fff3f0;
                color: var(--accent-2);
            }

            .status.ok {
                border-color: #b9d4c8;
                background: #edf8f3;
                color: var(--ok);
            }

            .status.loading {
                border-color: #d6d0bd;
                background: #fffaf0;
                color: #7a6a3c;
            }

            .status.loading::before {
                content: "";
                width: 10px;
                height: 10px;
                border: 2px solid currentColor;
                border-right-color: transparent;
                border-radius: 50%;
                animation: spin 0.75s linear infinite;
            }

            .status:empty {
                display: none;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .empty-state {
                padding: 44px 18px;
                color: var(--muted);
                text-align: center;
            }

            @media (max-width: 980px) {
                .topbar,
                .layout,
                .filter-grid,
                .compare {
                    grid-template-columns: 1fr;
                }

                .field {
                    grid-template-columns: 1fr;
                }

                .surface,
                .editor {
                    max-height: none;
                }

                .rows,
                .editor-body {
                    overflow: visible;
                }

                .lock {
                    margin-top: 0;
                }
            }
        </style>
    </head>
    <body>
        <dialog id="tokenDialog" class="token-dialog">
            <form id="tokenDialogForm" method="dialog">
                <h2>管理员验证</h2>
                <p>请输入 ADMIN_TOKEN 后进入翻译管理后台。</p>
                <label for="tokenDialogInput">ADMIN_TOKEN</label>
                <input id="tokenDialogInput" type="password" autocomplete="off" autofocus />
                <div id="tokenDialogError" class="dialog-error"></div>
                <div class="token-dialog-actions">
                    <button id="unlockAdmin" class="primary" type="submit">进入管理后台</button>
                </div>
            </form>
        </dialog>

        <main id="appShell" class="shell" aria-busy="true">
            <header class="topbar">
                <h1>Trakt 翻译管理后台</h1>
            </header>

            <section class="layout">
                <div class="surface">
                    <form id="filters" class="filters">
                        <div class="filter-grid">
                            <label class="filter-field" for="query">
                                <span class="filter-label">搜索</span>
                                <input id="query" type="search" placeholder="ID / 标题" />
                            </label>
                            <label class="filter-field" for="type">
                                <span class="filter-label">媒体类型</span>
                                <select id="type" aria-label="媒体类型">
                                    <option value="all">全部</option>
                                    <option value="movies">电影</option>
                                    <option value="shows">剧集</option>
                                    <option value="episodes">单集</option>
                                </select>
                            </label>
                            <label class="filter-field" for="override">
                                <span class="filter-label">覆盖状态</span>
                                <select id="override" aria-label="覆盖状态">
                                    <option value="all">全部</option>
                                    <option value="overridden">已覆盖</option>
                                    <option value="original">未覆盖</option>
                                </select>
                            </label>
                        </div>
                    </form>
                    <div class="list-head">
                        <span id="listMeta" class="meta">未加载</span>
                        <span id="listStatus" class="status" aria-live="polite"></span>
                    </div>
                    <div id="rows" class="rows"><div class="empty-state">输入 ID / 标题或点击筛选后查询</div></div>
                    <div id="loadMoreWrap" class="list-foot" hidden>
                        <button id="loadMore" type="button" disabled>加载更多</button>
                    </div>
                </div>

                <div class="surface editor">
                    <div class="editor-head">
                        <span class="editor-title-line">
                            <strong id="editorTitle">未选择条目</strong>
                            <span class="editor-meta">
                                <span id="editorMeta" class="meta"></span>
                                <span id="expiresMeta" class="meta expiry-meta"></span>
                            </span>
                        </span>
                        <span class="editor-tools">
                            <span id="status" class="status" aria-live="polite"></span>
                            <a
                                id="traktLink"
                                class="external-link icon-only"
                                href="https://app.trakt.tv"
                                target="_blank"
                                rel="noreferrer"
                                aria-label="打开 Trakt"
                                title="打开 Trakt"
                                hidden
                            >
                                <img class="trakt-icon" src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/trakt.svg" alt="" />
                            </a>
                        </span>
                    </div>
                    <div class="editor-body">
                        <div id="editorEmpty" class="empty-state">从左侧选择翻译条目</div>
                        <form id="editorForm" hidden>
                            <div class="field-grid">
                                <div class="field">
                                    <div>
                                        <label for="titleInput">标题</label>
                                        <input id="titleInput" />
                                    </div>
                                    <label class="lock"><input id="titleOverride" type="checkbox" /> 覆盖标题</label>
                                </div>
                                <div class="field">
                                    <div>
                                        <label for="overviewInput">简介</label>
                                        <textarea id="overviewInput"></textarea>
                                    </div>
                                    <label class="lock"><input id="overviewOverride" type="checkbox" /> 覆盖简介</label>
                                </div>
                                <div class="field">
                                    <div>
                                        <label for="taglineInput">标语</label>
                                        <input id="taglineInput" />
                                    </div>
                                    <label class="lock"><input id="taglineOverride" type="checkbox" /> 覆盖标语</label>
                                </div>
                            </div>

                            <div class="actions">
                                <button class="primary" type="submit">保存修改</button>
                                <button id="deleteOverride" type="button">清除覆盖</button>
                                <button id="deleteAll" class="danger" type="button">删除翻译</button>
                            </div>

                            <div class="compare">
                                <div>
                                    <label>当前翻译</label>
                                    <pre id="effectiveView"></pre>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </main>

        <script>
            const apiPath = "/api/trakt/translations/admin";
            const fields = ["title", "overview", "tagline"];
            const state = {
                selected: null,
                items: [],
                nextCursor: "0",
                hasQueriedList: false,
                editorBaseline: {},
                authenticated: false,
                activeToken: "",
                listRequestId: 0,
            };

            const $ = (id) => document.getElementById(id);
            const controls = {
                appShell: $("appShell"),
                tokenDialog: $("tokenDialog"),
                tokenDialogForm: $("tokenDialogForm"),
                tokenDialogInput: $("tokenDialogInput"),
                tokenDialogError: $("tokenDialogError"),
                unlockAdmin: $("unlockAdmin"),
                filters: $("filters"),
                type: $("type"),
                query: $("query"),
                override: $("override"),
                rows: $("rows"),
                listMeta: $("listMeta"),
                listStatus: $("listStatus"),
                loadMoreWrap: $("loadMoreWrap"),
                loadMore: $("loadMore"),
                editorTitle: $("editorTitle"),
                editorMeta: $("editorMeta"),
                expiresMeta: $("expiresMeta"),
                traktLink: $("traktLink"),
                editorEmpty: $("editorEmpty"),
                editorForm: $("editorForm"),
                titleInput: $("titleInput"),
                overviewInput: $("overviewInput"),
                taglineInput: $("taglineInput"),
                titleOverride: $("titleOverride"),
                overviewOverride: $("overviewOverride"),
                taglineOverride: $("taglineOverride"),
                effectiveView: $("effectiveView"),
                status: $("status"),
                deleteOverride: $("deleteOverride"),
                deleteAll: $("deleteAll"),
            };

            state.activeToken = localStorage.getItem("traktAdminToken") || "";
            controls.tokenDialogInput.value = state.activeToken;

            function setListMeta(message) {
                controls.listMeta.textContent = message;
            }

            function setListStatus(message, type = "") {
                controls.listStatus.textContent = message;
                controls.listStatus.className = `status ${type}`;
            }

            function setStatus(message, type = "") {
                controls.status.textContent = message;
                controls.status.className = `status ${type}`;
            }

            function getToken() {
                return state.activeToken;
            }

            function openTokenDialog(message = "") {
                state.authenticated = false;
                controls.appShell.inert = true;
                controls.appShell.setAttribute("aria-busy", "true");
                controls.tokenDialogError.textContent = message;
                controls.tokenDialogInput.value = localStorage.getItem("traktAdminToken") || state.activeToken || "";

                if (!controls.tokenDialog.open) {
                    controls.tokenDialog.showModal();
                }

                requestAnimationFrame(() => {
                    controls.tokenDialogInput.focus();
                    controls.tokenDialogInput.select();
                });
            }

            function closeTokenDialog() {
                state.authenticated = true;
                controls.appShell.inert = false;
                controls.appShell.removeAttribute("aria-busy");
                if (controls.tokenDialog.open) {
                    controls.tokenDialog.close();
                }
            }

            function enterAdmin(token) {
                state.activeToken = token;
                state.items = [];
                state.selected = null;
                state.hasQueriedList = false;
                localStorage.setItem("traktAdminToken", token);
                closeTokenDialog();
                setListMeta("等待查询");
                setListStatus("", "");
                setStatus("", "");
                state.nextCursor = "0";
                controls.loadMoreWrap.hidden = true;
                controls.loadMore.disabled = true;
                renderEditor(null);
            }

            async function validateAdminToken(token) {
                const previousToken = state.activeToken;
                state.activeToken = token;
                try {
                    await requestAdmin({
                        action: "auth",
                    });
                } catch (error) {
                    state.activeToken = previousToken;
                    throw error;
                }
            }

            async function unlockAdmin() {
                const token = controls.tokenDialogInput.value.trim();
                if (!token) {
                    controls.tokenDialogError.textContent = "请输入 ADMIN_TOKEN";
                    return;
                }

                controls.unlockAdmin.disabled = true;
                controls.tokenDialogError.textContent = "验证中...";
                try {
                    await validateAdminToken(token);
                    enterAdmin(token);
                } catch (error) {
                    controls.tokenDialogError.textContent = error.message || "管理员验证失败";
                    controls.tokenDialogInput.focus();
                    controls.tokenDialogInput.select();
                } finally {
                    controls.unlockAdmin.disabled = false;
                }
            }

            async function autoUnlockWithStoredToken() {
                const token = localStorage.getItem("traktAdminToken") || "";
                if (!token) {
                    openTokenDialog();
                    return;
                }

                controls.tokenDialogInput.value = token;
                try {
                    await validateAdminToken(token);
                    enterAdmin(token);
                } catch (error) {
                    localStorage.removeItem("traktAdminToken");
                    state.activeToken = "";
                    openTokenDialog(error.message || "管理员验证失败");
                }
            }

            async function requestAdmin(params, options = {}) {
                const token = getToken();
                const url = new URL(apiPath, window.location.origin);
                Object.entries(params || {}).forEach(([key, value]) => {
                    if (value !== undefined && value !== null && value !== "") {
                        url.searchParams.set(key, value);
                    }
                });

                const response = await fetch(url, {
                    ...options,
                    headers: {
                        Authorization: `Bearer ${token}`,
                        "Content-Type": "application/json",
                        ...(options.headers || {}),
                    },
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    const error = new Error(data.error || `HTTP ${response.status}`);
                    error.status = response.status;
                    if (response.status === 401 && state.authenticated) {
                        openTokenDialog(data.error || "管理员验证失败");
                    }
                    throw error;
                }
                return data;
            }

            function getTranslation(entry) {
                return (entry?.translation) || {};
            }

            function getTranslationOverrides(entry) {
                return (entry?.translation) || {};
            }

            function getFieldControls(field) {
                return {
                    title: {
                        input: controls.titleInput,
                        override: controls.titleOverride,
                    },
                    overview: {
                        input: controls.overviewInput,
                        override: controls.overviewOverride,
                    },
                    tagline: {
                        input: controls.taglineInput,
                        override: controls.taglineOverride,
                    },
                }[field];
            }

            function trimInputValue(value) {
                return String(value || "").trim();
            }

            function isEmptyTranslationValue(value) {
                return value === undefined || value === null || value === "";
            }

            function updateOverrideMark(field) {
                const fieldControls = getFieldControls(field);
                if (!fieldControls || !state.selected) {
                    return;
                }

                const baseline = trimInputValue(state.editorBaseline[field]);
                const current = trimInputValue(fieldControls.input.value);
                fieldControls.override.checked = current !== baseline;
            }

            function hasOverriddenFields() {
                return fields.some((field) => getFieldControls(field).override.checked);
            }

            function restoreOriginalTranslation(field) {
                const fieldControls = getFieldControls(field);
                if (!fieldControls || !state.selected || fieldControls.override.checked) {
                    return;
                }

                fieldControls.input.value = state.editorBaseline[field] || "";
            }

            function getTranslationOverridesPayload() {
                return {
                    ...(controls.titleOverride.checked && controls.titleInput.value.trim() ? { title: controls.titleInput.value.trim() } : {}),
                    ...(controls.overviewOverride.checked && controls.overviewInput.value.trim() ? { overview: controls.overviewInput.value.trim() } : {}),
                    ...(controls.taglineOverride.checked && controls.taglineInput.value.trim() ? { tagline: controls.taglineInput.value.trim() } : {}),
                };
            }

            function statusLabel(entry) {
                if (!entry || entry.status === 3) {
                    return "翻译程度：无";
                }
                if (entry.status === 2) {
                    return "翻译程度：部分";
                }
                return "翻译程度：完整";
            }

            function mediaTypeLabel(type) {
                if (type === "movies") {
                    return "电影";
                }
                if (type === "shows") {
                    return "剧集";
                }
                if (type === "episodes") {
                    return "单集";
                }
                return type || "";
            }

            function getTraktUrl(item) {
                if (!item?.type || !item.id) {
                    return "";
                }

                if (item.type === "movies") {
                    return `https://app.trakt.tv/movies/${encodeURIComponent(item.id)}`;
                }

                if (item.type === "shows") {
                    return `https://app.trakt.tv/shows/${encodeURIComponent(item.id)}`;
                }

                const episodeParts = String(item.id).split(":");
                if (item.type === "episodes" && episodeParts.length === 3) {
                    const [showId, season, episode] = episodeParts.map((part) => encodeURIComponent(part));
                    return `https://app.trakt.tv/shows/${showId}/seasons/${season}/episodes/${episode}`;
                }

                return `https://app.trakt.tv/search?query=${encodeURIComponent(item.id)}`;
            }

            function renderRows() {
                controls.rows.innerHTML = "";
                if (state.items.length === 0) {
                    controls.rows.innerHTML = state.hasQueriedList
                        ? '<div class="empty-state">没有匹配结果</div>'
                        : '<div class="empty-state">输入 ID / 标题或点击筛选后查询</div>';
                    return;
                }

                controls.rows.innerHTML = `
                    <div class="row-header">
                        <span>ID</span>
                        <span>标题</span>
                        <span>媒体类型</span>
                        <span>覆盖状态</span>
                    </div>
                `;
                for (const item of state.items) {
                    const translation = getTranslation(item.effectiveEntry);
                    const translationOverrides = getTranslationOverrides(item.override);
                    const overrideCount = fields.filter((field) => !isEmptyTranslationValue(translationOverrides[field])).length;
                    const button = document.createElement("button");
                    button.type = "button";
                    button.className = `row ${state.selected && state.selected.type === item.type && state.selected.id === item.id ? "active" : ""}`;
                    button.innerHTML = `
                        <span class="id">${escapeHtml(item.id)}</span>
                        <span class="title">${escapeHtml(translation.title || "(无标题)")}</span>
                        <span class="media-type">${escapeHtml(mediaTypeLabel(item.type))}</span>
                        <span class="badge ${overrideCount ? "overridden" : ""}">${overrideCount ? "已覆盖" : "未覆盖"}</span>
                    `;
                    button.addEventListener("click", () => {
                        loadEditor(item).catch((error) => {
                            setStatus(error.message || String(error), "error");
                        });
                    });
                    controls.rows.append(button);
                }
            }

            function updateListItem(updatedItem) {
                if (!updatedItem?.type || !updatedItem.id) {
                    return;
                }
                state.items = state.items.map((item) => (item.type === updatedItem.type && item.id === updatedItem.id ? updatedItem : item));
            }

            async function loadEditor(item) {
                renderEditor(item);
                if (!item?.type || !item.id) {
                    return null;
                }
                if (!item.autoEntry || Object.hasOwn(item.autoEntry, "expiresAt")) {
                    return item;
                }

                controls.expiresMeta.textContent = "到期：读取中...";
                const detail = await requestAdmin({
                    action: "item",
                    type: item.type,
                    id: item.id,
                });
                updateListItem(detail);
                if (!state.selected || state.selected.type !== item.type || state.selected.id !== item.id) {
                    renderRows();
                    return detail;
                }
                renderEditor(detail);
                return detail;
            }

            function renderEditor(item) {
                state.selected = item;
                renderRows();
                controls.editorEmpty.hidden = !!item;
                controls.editorForm.hidden = !item;

                if (!item) {
                    controls.editorTitle.textContent = "未选择条目";
                    controls.editorMeta.textContent = "";
                    controls.expiresMeta.textContent = "";
                    controls.traktLink.hidden = true;
                    controls.traktLink.href = "https://app.trakt.tv";
                    state.editorBaseline = {};
                    return;
                }

                const translationOverrides = getTranslationOverrides(item.override);
                const originalTranslation = getTranslation(item.autoEntry);
                const effectiveTranslation = getTranslation(item.effectiveEntry);
                const traktUrl = getTraktUrl(item);
                controls.editorTitle.textContent = `${mediaTypeLabel(item.type)} / ${item.id}`;
                controls.editorMeta.textContent = statusLabel(item.effectiveEntry);
                controls.expiresMeta.textContent = getExpiresLabel(item);
                controls.traktLink.href = traktUrl;
                controls.traktLink.hidden = !traktUrl;
                controls.titleInput.value = translationOverrides.title || effectiveTranslation.title || "";
                controls.overviewInput.value = translationOverrides.overview || effectiveTranslation.overview || "";
                controls.taglineInput.value = translationOverrides.tagline || effectiveTranslation.tagline || "";
                state.editorBaseline = {
                    title: originalTranslation.title || "",
                    overview: originalTranslation.overview || "",
                    tagline: originalTranslation.tagline || "",
                };
                controls.titleOverride.checked = Object.hasOwn(translationOverrides, "title");
                controls.overviewOverride.checked = Object.hasOwn(translationOverrides, "overview");
                controls.taglineOverride.checked = Object.hasOwn(translationOverrides, "tagline");
                controls.effectiveView.innerHTML = highlightJson(item.effectiveEntry);
            }

            let querySearchTimer = 0;

            function shouldOpenFirstResult() {
                return controls.query.value.trim() !== "";
            }

            function shouldSkipListRequest(options = {}) {
                if (options.append === true) {
                    return false;
                }

                return controls.query.value.trim() === "" && controls.type.value === "all" && controls.override.value === "all";
            }

            function resetListToIdleState() {
                state.listRequestId += 1;
                state.items = [];
                state.hasQueriedList = false;
                state.nextCursor = "0";
                controls.loadMoreWrap.hidden = true;
                controls.loadMore.disabled = true;
                setListMeta("等待查询");
                setListStatus("", "");
                renderEditor(null);
            }

            function refreshFirstPage(options = {}) {
                if (shouldSkipListRequest(options)) {
                    resetListToIdleState();
                    return Promise.resolve(null);
                }

                renderEditor(null);
                state.nextCursor = "0";
                return loadList({ ...options, append: false, cursor: "" });
            }

            async function loadList(options = {}) {
                if (shouldSkipListRequest(options)) {
                    resetListToIdleState();
                    return null;
                }

                if (!getToken()) {
                    setListStatus("请输入 ADMIN_TOKEN", "error");
                    return;
                }

                const requestId = ++state.listRequestId;
                const query = controls.query.value.trim();
                const append = options.append === true;
                setListMeta(append ? "正在加载更多..." : "正在筛选...");
                setListStatus("", "");
                controls.loadMore.disabled = true;
                let data;
                try {
                    data = await requestAdmin({
                        action: "list",
                        type: controls.type.value,
                        cursor: options.cursor || "",
                        limit: 100,
                        q: query,
                        override: controls.override.value,
                    });
                } catch (error) {
                    if (requestId !== state.listRequestId) {
                        return null;
                    }
                    throw error;
                }

                if (requestId !== state.listRequestId) {
                    return null;
                }

                const incomingItems = data.items || [];
                state.items = append ? [...state.items, ...incomingItems] : incomingItems;
                state.hasQueriedList = true;
                state.nextCursor = data.cursor || "0";
                controls.loadMoreWrap.hidden = state.nextCursor === "0";
                controls.loadMore.disabled = state.nextCursor === "0";
                controls.listMeta.textContent = `已显示 ${state.items.length} 条 · 本次 ${incomingItems.length} 条${state.nextCursor === "0" ? "" : " · 还有更多"}`;
                renderRows();
                if (!append && options.openFirstResult && query && state.items.length > 0) {
                    await loadEditor(state.items[0]);
                }
                return data;
            }

            function scheduleQuerySearch() {
                window.clearTimeout(querySearchTimer);
                querySearchTimer = window.setTimeout(
                    () => {
                        refreshFirstPage({ openFirstResult: shouldOpenFirstResult() }).catch((error) => setListStatus(error.message, "error"));
                    },
                    controls.query.value.trim() ? 300 : 0,
                );
            }

            function escapeHtml(value) {
                return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
            }

            function formatDateTime(timestamp) {
                return new Intl.DateTimeFormat("zh-CN", {
                    year: "numeric",
                    month: "2-digit",
                    day: "2-digit",
                    hour: "2-digit",
                    minute: "2-digit",
                    hour12: false,
                }).format(new Date(timestamp));
            }

            function getExpiresLabel(item) {
                if (!item?.autoEntry) {
                    return "到期：无缓存";
                }
                if (!Object.hasOwn(item.autoEntry, "expiresAt")) {
                    return "到期：未知";
                }
                return Number.isFinite(item.autoEntry.expiresAt) ? `到期：${formatDateTime(item.autoEntry.expiresAt)}` : "到期：永久";
            }

            function highlightJson(value) {
                const json = JSON.stringify(value, null, 2);
                return json.replace(
                    /("(?:\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*")(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?/g,
                    (match, stringValue, keySuffix, literalValue) => {
                        if (stringValue) {
                            const className = keySuffix ? "json-key" : "json-string";
                            return `<span class="${className}">${escapeHtml(stringValue)}</span>${keySuffix || ""}`;
                        }
                        if (literalValue === "true" || literalValue === "false") {
                            return `<span class="json-boolean">${literalValue}</span>`;
                        }
                        if (literalValue === "null") {
                            return '<span class="json-null">null</span>';
                        }
                        return `<span class="json-number">${match}</span>`;
                    },
                );
            }

            controls.tokenDialog.addEventListener("cancel", (event) => {
                event.preventDefault();
            });

            controls.tokenDialogForm.addEventListener("submit", (event) => {
                event.preventDefault();
                unlockAdmin();
            });

            controls.filters.addEventListener("submit", (event) => {
                event.preventDefault();
                refreshFirstPage({ openFirstResult: shouldOpenFirstResult() }).catch((error) => setListStatus(error.message, "error"));
            });

            [controls.type, controls.override].forEach((control) => {
                control.addEventListener("change", () => {
                    refreshFirstPage({ openFirstResult: shouldOpenFirstResult() }).catch((error) => setListStatus(error.message, "error"));
                });
            });

            controls.query.addEventListener("input", scheduleQuerySearch);
            controls.query.addEventListener("search", (event) => {
                if (controls.query.value.trim() !== "") {
                    return;
                }

                event.preventDefault();
                window.clearTimeout(querySearchTimer);
                refreshFirstPage({ openFirstResult: false }).catch((error) => setListStatus(error.message, "error"));
            });
            fields.forEach((field) => {
                const fieldControls = getFieldControls(field);
                fieldControls.input.addEventListener("input", () => updateOverrideMark(field));
                fieldControls.override.addEventListener("change", () => restoreOriginalTranslation(field));
            });

            controls.loadMore.addEventListener("click", () => {
                if (state.nextCursor === "0") {
                    return;
                }
                loadList({ append: true, cursor: state.nextCursor }).catch((error) => setListStatus(error.message, "error"));
            });

            controls.editorForm.addEventListener("submit", async (event) => {
                event.preventDefault();
                if (!state.selected) {
                    return;
                }

                setStatus("保存中...", "loading");
                if (!hasOverriddenFields() && state.selected.override) {
                    const data = await requestAdmin(
                        {
                            type: state.selected.type,
                            id: state.selected.id,
                            target: "override",
                        },
                        { method: "DELETE" },
                    );
                    renderEditor(data);
                    await loadList({ cursor: "" });
                    setStatus("已清除覆盖", "ok");
                    return;
                }

                const data = await requestAdmin(
                    {},
                    {
                        method: "PUT",
                        body: JSON.stringify({
                            type: state.selected.type,
                            id: state.selected.id,
                            translation: getTranslationOverridesPayload(),
                        }),
                    },
                );
                renderEditor(data);
                await loadList({ cursor: "" });
                setStatus("已保存", "ok");
            });

            async function deleteTarget(target, labels) {
                if (!state.selected) {
                    return;
                }
                setStatus(labels.loading, "loading");
                const data = await requestAdmin(
                    {
                        type: state.selected.type,
                        id: state.selected.id,
                        target,
                    },
                    { method: "DELETE" },
                );
                renderEditor(data);
                await loadList({ cursor: "" });
                setStatus(labels.done, "ok");
            }

            controls.deleteOverride.addEventListener("click", () =>
                deleteTarget("override", {
                    loading: "正在清除覆盖...",
                    done: "已清除覆盖",
                }).catch((error) => setStatus(error.message, "error")),
            );
            controls.deleteAll.addEventListener("click", () =>
                deleteTarget("all", {
                    loading: "正在删除翻译...",
                    done: "已删除翻译",
                }).catch((error) => setStatus(error.message, "error")),
            );

            autoUnlockWithStoredToken();
        </script>
    </body>
</html>
